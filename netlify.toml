[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "infra/netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["backend/src/routes/**", "backend/src/services/**", "backend/src/database/**", "backend/src/middlewares/**", "shared/src/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
